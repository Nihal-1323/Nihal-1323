<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 180"
     width="900"
     height="180"
     role="img"
     aria-label="Animated NIHAL">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8">
        <animate attributeName="stop-color"
                 values="#38BDF8;#8B5CF6;#22C55E;#38BDF8"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8B5CF6">
        <animate attributeName="stop-color"
                 values="#8B5CF6;#22C55E;#38BDF8;#8B5CF6"
                 dur="8s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .text{
        font-family:'Segoe UI',Arial,sans-serif;
        font-size:110px;
        font-weight:800;
        letter-spacing:8px;

        fill:none;
        stroke:url(#grad);
        stroke-width:4;
        stroke-linecap:round;
        stroke-linejoin:round;

        stroke-dasharray:1000;
        stroke-dashoffset:1000;

        animation:
          draw 3s ease forwards,
          pulse 4s ease-in-out infinite 3s;
      }

      @keyframes draw{
        to{
          stroke-dashoffset:0;
        }
      }

      @keyframes pulse{
        0%,100%{
          filter:drop-shadow(0 0 2px rgba(56,189,248,.4));
        }
        50%{
          filter:drop-shadow(0 0 10px rgba(139,92,246,.8));
        }
      }

      .cursor{
        animation:blink 1s steps(2,end) infinite;
      }

      @keyframes blink{
        50%{
          opacity:0;
        }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <text x="60"
        y="120"
        class="text"
        filter="url(#glow)">
    NIHAL
  </text>

  <rect class="cursor"
        x="760"
        y="42"
        width="6"
        height="92"
        rx="2"
        fill="#38BDF8">
    <animate attributeName="x"
             values="60;760;760"
             dur="3s"
             fill="freeze"/>
  </rect>

</svg>
